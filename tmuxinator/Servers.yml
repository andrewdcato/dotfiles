# ~/.tmuxinator/Servers.yml

name: Servers
root: ~/

windows:
  - LMS:
      layout: 0bd9,178x45,0,0{89x45,0,0,0,88x45,90,0[88x22,90,0,5,88x22,90,23,6]}
      pre: ssh lms
      panes:
        - watchlogs:
          - watchlogs
        - htop:
          - htop
        - iotop:
          - sudo iotop
  - SBcom:
      layout: 0bd9,178x45,0,0{89x45,0,0,0,88x45,90,0[88x22,90,0,5,88x22,90,23,6]}
      pre: ssh sb
      panes:
        - sudo tail -f /var/log/apache2/error.log
        - htop
        - sudo iotop
  - DocuSign:
      layout: 0bd9,178x45,0,0{89x45,0,0,0,88x45,90,0[88x22,90,0,5,88x22,90,23,6]}
      pre: ssh docusign
      panes:
        - watchlogs:
          - watchlogs
        - htop:
          - htop
        - iotop:
          - sudo iotop
  - MailerService:
      layout: 2bad,286x70,0,0{143x70,0,0,6,142x70,144,0[142x27,144,0,7,142x21,144,28,8,142x20,144,50,9]}
      pre: ssh mail
      panes:
        - logs:
          - sudo su node
          - pm2 logs
        - htop:
          - htop
        - monit:
          - sudo su node
          - pm2 monit
        - iotop:
          - sudo iotop
  - DB1:
      layout: 0bd9,178x45,0,0{89x45,0,0,0,88x45,90,0[88x22,90,0,5,88x22,90,23,6]}
      pre: ssh db1
      panes:
        - logs:
          - tail -F /var/log/mongodb/mongod.log
        - htop:
          - htop
        - iotop:
          - sudo iotop
  - DB2:
      layout: 0bd9,178x45,0,0{89x45,0,0,0,88x45,90,0[88x22,90,0,5,88x22,90,23,6]}
      pre: ssh db2
      panes:
        - logs:
          - tail -F /var/log/mongodb/mongod.log
        - htop:
          - htop
        - iotop:
          - sudo iotop
  - Jenkins:
      layout: 0bd9,178x45,0,0{89x45,0,0,0,88x45,90,0[88x22,90,0,5,88x22,90,23,6]}
      pre: ssh ci
      panes:
        - junk:
          -
        - htop:
          - htop
        - iotop:
          - sudo iotop
