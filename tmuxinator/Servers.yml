# ~/.tmuxinator/Servers.yml

name: Servers
root: ~/

windows:
  - lms:
      layout: 49e3,314x78,0,0[314x39,0,0{118x39,0,0,11,195x39,119,0,15},314x38,0,40{118x38,0,40,12,195x38,119,40,13}]
      panes:
        - lmsHtop:
          - ssh lms -t "clear; printf '\033]2;LMS HTOP\033\\'; htop"
        - lmsLogs:
          - ssh lms -t "clear; printf '\033]2;LMS Logs\033\\'; watchlogs"
        - schedulerHtop:
          - ssh lms-services -t "clear; printf '\033]2;Scheduler HTOP\033\\'; htop"
        - schedulerLogs:
          - ssh lms-services -t "clear; printf '\033]2;Scheduler Logs\033\\'; watchlogs-scheduler"

  - 360:
      layout: 49e3,314x78,0,0[314x39,0,0{118x39,0,0,11,195x39,119,0,15},314x38,0,40{118x38,0,40,12,195x38,119,40,13}]
      panes:
        - htopAMS:
          - ssh lms-services -t "clear; printf '\033]2;htop-lms-services\033\\'; htop"
        - logsAMS:
          - ssh lms-services -t "clear; printf '\033]2;watchlogs-ams service\033\\'; watchlogs-ams"
        - htopSync:
          - ssh sync -t "clear; printf '\033]2;htop-sync\033\\'; htop"
        - logsSync:
          - ssh sync -t "clear; printf '\033]2;watchlogs-sync\033\\'; watchlogs"
  - dbs:
      layout: c464,314x78,0,0[314x25,0,0{118x25,0,0,10,195x25,119,0,22},314x25,0,26{118x25,0,26,16,195x25,119,26,21},314x26,0,52{118x26,0,52,17,195x26,119,52,20}]
      panes:
        - htopDB1:
          - ssh db1 -t htop
        - db1:
          - ssh db1
        - htopDB2:
          - ssh db2 -t htop
        - db2:
          - ssh db2
        - htopDB3:
          - ssh db3 -t htop
        - db3:
          - ssh db3


