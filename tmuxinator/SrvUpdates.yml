# ~/.tmuxinator/SrvUpdates.yml

name: Server Updates
root: ~

windows:
  - LMS:
      pre: ssh lms -t 'sudo apt-get update'
  - SBcom:
      pre: ssh sb -t 'sudo apt-get update'
  - DocuSign:
      pre: ssh docusign -t 'sudo apt-get update'
  - MailerService:
      pre: ssh mail -t 'sudo apt-get update'
  - DB1:
      pre: ssh db1 -t 'sudo apt-get update'
  - DB2:
      pre: ssh db2 -t 'sudo apt-get update'
  - DB3:
      pre: ssh db3 -t 'sudo apt-get update'
  - Jenkins:
      pre: ssh ci -t 'sudo apt-get update'
  - Connect:
      pre: ssh connect -t 'sudo apt-get update'
  - Connect Beta:
      pre: ssh connect-beta -t 'sudo apt-get update'
  - Beta:
      pre: ssh beta -t 'sudo apt-get update'
